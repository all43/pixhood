<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Pixhood</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <div id="topbar">
      <div id="logo">PIXHOOD</div>
      <div id="palette"></div>
    </div>
    <div id="map"></div>
  </div>
  <div id="loading">
    <div id="welcome">
      <div id="welcome-title">PIXHOOD</div>
      <div id="welcome-text">
        Paint pixels on a map of your city.<br>
        Allow location access to start painting where you are.
      </div>
      <div id="welcome-buttons">
        <button id="btn-enable-geo">Enable location</button>
        <button id="btn-skip-geo">Continue without</button>
      </div>
    </div>
    <div id="loading-spinner-screen" class="hidden">
      <div id="loading-spinner"></div>
      <div id="loading-text"></div>
      <div id="loading-slow-hint"></div>
    </div>
  </div>
  <div id="location-banner">
    <span class="banner-text"></span>
    <button class="banner-close">&times;</button>
  </div>
  <div id="toast"></div>

  <!-- Leaflet (only external dependency) -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- App (order matters: config → grid → pixels → map → app) -->
  <script src="config.js"></script>
  <script src="grid.js"></script>
  <script src="pixels.js"></script>
  <script src="map.js"></script>
  <script src="app.js"></script>
</body>
</html>
