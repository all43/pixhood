<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <base href="/" />
  <meta name="description" content="Paint pixels on a map — ephemeral collaborative art" />
  <meta name="theme-color" content="#16213e" />
  <link rel="manifest" href="/manifest.json?v=2" />
  <link rel="apple-touch-icon" href="/icon-512.png" />
  <title>Pixhood</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <div id="topbar">
      <div id="topbar-left">
        <button id="menu-btn" type="button"><span></span></button>
        <div id="logo"><img src="icons/logo.svg" alt="" class="logo-icon" /><span class="logo-text">PIXHOOD</span></div>
      </div>
      <div id="palette"></div>
    </div>
    <div id="map"></div>
    <div id="map-flash"></div>
  </div>
  <div id="loading">
    <div id="welcome">
      <div id="welcome-title"><img src="icons/logo.svg" alt="" class="logo-icon-lg" />PIXHOOD</div>
      <div id="welcome-text">
        <p>Paint pixels on a map — ephemeral collaborative art.</p>
        <p>Pixels fade after 24 hours. Zoom in close for detailed sub-grid drawing.</p>
        <p class="location-cta">Enable location to paint where you are</p>
      </div>
      <div id="welcome-buttons">
        <button id="btn-enable-geo">Enable location</button>
        <button id="btn-skip-geo">Continue without</button>
      </div>
      <div id="welcome-divider">
        <span>or paint with friends</span>
      </div>
      <div id="welcome-space-buttons">
        <button id="btn-create-space">Create Space</button>
        <button id="btn-join-space">Join Space</button>
      </div>
      <div id="join-space-form" class="hidden">
        <input id="join-space-input" type="text" placeholder="Paste space link or code" autocomplete="off" spellcheck="false" />
        <button id="btn-join-go">Go</button>
        <button id="btn-join-back" type="button">Back</button>
      </div>
      <a id="privacy-link" href="privacy.html">Privacy Policy</a>
    </div>
    <div id="loading-spinner-screen" class="hidden">
      <div id="loading-spinner"></div>
      <div id="loading-text"></div>
      <div id="loading-slow-hint"></div>
    </div>
  </div>
  <div id="location-banner">
    <span class="banner-text"></span>
    <button class="banner-close">&times;</button>
  </div>
  <div id="toast-container"></div>
  <div id="menu-backdrop"></div>
  <nav id="menu-panel">
    <div id="menu-space-section" class="hidden">
      <div class="menu-section-label">Space</div>
      <div id="menu-space-slug"></div>
      <button type="button" id="menu-btn-copy-space" class="menu-item">Copy Link</button>
      <a href="/" id="menu-btn-leave-space" class="menu-item">Leave Space</a>
      <hr class="menu-sep" />
    </div>
    <button type="button" id="menu-btn-create-space" class="menu-item">Create Space</button>
    <button type="button" id="menu-btn-join-space" class="menu-item">Join Space</button>
    <div id="menu-join-form" class="hidden">
      <input type="text" id="menu-join-input" placeholder="Paste space link or code" autocomplete="off" spellcheck="false" />
      <div class="menu-join-actions">
        <button type="button" id="menu-join-go">Go</button>
        <button type="button" id="menu-join-back">Cancel</button>
      </div>
    </div>
    <hr class="menu-sep" />
    <button type="button" id="menu-btn-install" class="menu-item hidden">Install App</button>
    <a href="privacy.html" class="menu-item">Privacy Policy</a>
  </nav>

  <!-- Leaflet (only external dependency) -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- App (order matters: config → grid → pixels → map → app) -->
  <script src="config.js"></script>
  <script src="grid.js"></script>
  <script src="pixels.js"></script>
  <script src="map.js"></script>
  <script src="app.js"></script>

  <!-- Admin (loaded dynamically on #admin) -->
  <script>
    function loadAdmin() {
      if (document.getElementById('admin-css')) return;
      document.head.appendChild(Object.assign(document.createElement('link'), { rel: 'stylesheet', href: 'admin.css', id: 'admin-css' }));
      var _as = document.createElement('script');
      _as.src = 'admin.js';
      document.body.appendChild(_as);
    }
    if (location.hash === '#admin') loadAdmin();
    window.addEventListener('hashchange', function() { if (location.hash === '#admin') loadAdmin(); });
  </script>

  <!-- Service Worker registration (production only) -->
  <script>
    if ('serviceWorker' in navigator && location.hostname !== 'localhost') {
      navigator.serviceWorker.register('/sw.js?v=20260416c')
        .then(reg => console.log('SW registered:', reg.scope))
        .catch(err => console.log('SW registration failed:', err));
    }
  </script>
</body>
</html>
